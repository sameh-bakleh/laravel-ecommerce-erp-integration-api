name: Feature request
description: Suggest an improvement to the integration API
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the **integration problem** first. This repo focuses on ERP ingestion, queues, webhooks, and retries.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What integration scenario is not covered today?
      placeholder: Need idempotent replay protection on webhooks using event timestamps...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you approach it within the existing service layer?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options you evaluated

  - type: checkboxes
    id: scope
    attributes:
      label: Area
      options:
        - label: REST API / controllers
        - label: Webhooks
        - label: Queue jobs / retry
        - label: ERP client / mappers
        - label: Database / migrations
        - label: Docker / CI
        - label: Documentation
